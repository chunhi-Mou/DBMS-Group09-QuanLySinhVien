spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sinhvien?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: chunhi
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    show-sql: false
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080
springdoc:
  swagger-ui:
    path: /swagger-ui.html
logging:
  level:
    com.qlsv: DEBUG
qlsv:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-this-is-a-32-byte-development-secret!}
    ttl-seconds: 86400
